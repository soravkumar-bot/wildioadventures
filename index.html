<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Age Verification</title>

<style>
/* Reset */
body, html {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    height: 100%;
}

/* ===== DESKTOP BACKGROUND ===== */
body {
    background: url('./screen.png') no-repeat top center;
    background-size: cover;
    background-attachment: fixed;
    min-height: 100vh;
}

/* ===== DARK OVERLAY ===== */
body::before {
    content: '';
    position: fixed;
    inset: 0;
    
    background: rgba(0,0,0,0.5); /* keep slight dark */
    
    backdrop-filter: blur(8px);          /* MAIN BLUR */
    -webkit-backdrop-filter: blur(8px);  /* Safari support */
    
    z-index: 1;
}

/* ===== POPUP ===== */
.age-verification-container {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    
    width: 90%;
    max-width: 360px;
    padding: 15px;

    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(5px);
    border-radius: 12px;
    text-align: center;

    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    z-index: 2;
}

/* TEXT */
.content h1 {
    font-size: 1.2rem;
    margin-bottom: 10px;
}

.content p {
    font-size: 0.95rem;
    margin-bottom: 15px;
}

/* BUTTONS */
.buttons {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
}

.btn {
    background-color: #0081a1;
    color: #fff;
    padding: 8px 12px;
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 700;
    border-radius: 6px;
    transition: 0.3s;
}

.btn:hover {
    background-color: #0b00a1;
}

/* ===== MOBILE PERFECT FIX ===== */
@media (max-width: 768px) {
    body {
        background: url('./screen.png') no-repeat top center;
        background-size: contain;   /* SHOW FULL IMAGE */
        background-color: #000;     /* fill empty space */
        background-attachment: scroll;
        min-height: 100vh;
    }

    .age-verification-container {
        max-width: 280px;
        padding: 12px;
    }

    .content h1 {
        font-size: 1rem;
    }

    .content p {
        font-size: 0.85rem;
    }

    .btn {
        font-size: 0.8rem;
        padding: 7px 10px;
    }
}
</style>
</head>

<body>

<div class="age-verification-container">
    <div class="content">
        <h1>Age Verification</h1>
        <p>You must be 18 or older to enter this site.</p>

        <div class="buttons">
            <a href="http://coinzest.site/?utm_campaign=GL7c7xwY4G&v1=[v1]&v2=[v2]&v3=[v3]" class="btn">I am 18 or Older</a>
            <a href="http://coinzest.site/?utm_campaign=GL7c7xwY4G&v1=[v1]&v2=[v2]&v3=[v3]" class="btn">I am Under 18</a>
        </div>
    </div>
</div>

</body>
</html>
